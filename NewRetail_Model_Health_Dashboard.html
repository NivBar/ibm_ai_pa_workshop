<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NewRetail Planning Analytics Model Health Dashboard</title>
  <style>
    :root{--ink:#101828;--muted:#667085;--line:#d8e1ec;--blue:#0f62fe;--navy:#07172d;--green:#198038;--amber:#8e5a00;--red:#da1e28}*{box-sizing:border-box}body{margin:0;background:#f4f7fb;color:var(--ink);font:15px/1.5 Inter,system-ui,sans-serif}header{padding:42px max(22px,calc((100vw - 1180px)/2));background:radial-gradient(circle at 85% 10%,#007d7970,transparent 28%),linear-gradient(135deg,#061326,#153b69);color:white}header p{color:#d0e2ff}h1{margin:5px 0;font-size:clamp(36px,5vw,62px);line-height:1}.eyebrow{color:#78a9ff;font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase}nav{position:sticky;top:0;z-index:3;display:flex;gap:7px;padding:10px max(22px,calc((100vw - 1180px)/2));overflow:auto;border-bottom:1px solid var(--line);background:#fffffff4;backdrop-filter:blur(12px)}button,input{font:inherit}nav button{border:1px solid #b8c7dc;border-radius:20px;background:white;padding:7px 12px;cursor:pointer;white-space:nowrap}nav button.active{border-color:var(--blue);background:var(--blue);color:white}main{max-width:1180px;margin:auto;padding:22px}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.kpis article,.panel{border:1px solid var(--line);border-radius:11px;background:white;box-shadow:0 10px 30px #0f172a0d}.kpis article{padding:18px}.kpis span{display:block;color:var(--muted);font-size:11px;font-weight:800;text-transform:uppercase}.kpis strong{font-size:32px}.toolbar{display:flex;justify-content:space-between;gap:16px;margin:20px 0}.toolbar input{width:min(420px,100%);border:1px solid #b8c7dc;border-radius:7px;padding:10px 12px}.status{color:var(--muted);font-size:13px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.panel{padding:20px;border-top:4px solid var(--green)}.panel.inference{border-top-color:#f1c21b}.panel.unknown{border-top-color:var(--red)}.badges{display:flex;gap:6px}.badge{border-radius:20px;background:#edf5ff;color:#0043ce;padding:4px 8px;font-size:10px;font-weight:800;text-transform:uppercase}.badge.fact{background:#defbe6;color:#0e6027}.badge.inference{background:#fff8e1;color:var(--amber)}.badge.unknown{background:#fff1f1;color:#a2191f}.panel h2{margin:12px 0 2px;font-size:20px}.panel small{color:var(--muted)}.panel pre{white-space:pre-wrap;font:14px/1.55 inherit}.source{border-top:1px solid #e4e7ec;padding-top:10px;color:var(--muted);font-size:12px}.empty{grid-column:1/-1;padding:70px 24px;border:1px dashed #98a2b3;border-radius:11px;background:white;text-align:center}.empty h2{margin:0}.empty p{color:var(--muted)}@media(max-width:760px){.kpis,.grid{grid-template-columns:1fr 1fr}.toolbar{display:block}.toolbar input{margin-bottom:10px}}@media(max-width:520px){.kpis,.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header><span class="eyebrow">Planning Analytics · NewRetail</span><h1>Model Health Dashboard</h1><p>One cumulative, evidence-backed view built throughout the workshop.</p></header>
  <nav id="views" aria-label="Dashboard views"></nav>
  <main>
    <section class="kpis" aria-label="Evidence summary"><article><span>Evidence items</span><strong id="total">0</strong></article><article><span>Verified facts</span><strong id="facts">0</strong></article><article><span>Modules represented</span><strong id="modules">0</strong></article><article><span>Open unknowns</span><strong id="unknowns">0</strong></article></section>
    <div class="toolbar"><input id="search" type="search" aria-label="Search dashboard" placeholder="Search dashboard evidence"><span class="status" id="status"></span></div>
    <section class="grid" id="content" aria-live="polite"></section>
  </main>
  <script>
    /* Bob: append verified workshop results to this array; preserve all existing entries. */
    const WORKSHOP_DATA=[];
    const LABELS={all:"All",executive:"Executive",analysis:"Analysis",model:"Model",operations:"Operations",change:"Change",evidence:"Evidence"};
    let active="all";
    const escape=value=>String(value??"").replace(/[&<>"']/g,char=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[char]));
    function render(){const query=document.querySelector("#search").value.toLowerCase();const rows=WORKSHOP_DATA.filter(item=>(active==="all"||item.view===active)&&Object.values(item).join(" ").toLowerCase().includes(query));document.querySelector("#total").textContent=WORKSHOP_DATA.length;document.querySelector("#facts").textContent=WORKSHOP_DATA.filter(x=>x.classification==="fact").length;document.querySelector("#modules").textContent=new Set(WORKSHOP_DATA.map(x=>x.module)).size;document.querySelector("#unknowns").textContent=WORKSHOP_DATA.filter(x=>x.classification==="unknown").length;document.querySelector("#status").textContent=`Showing ${rows.length} of ${WORKSHOP_DATA.length} evidence items`;document.querySelector("#content").innerHTML=rows.length?rows.map(item=>`<article class="panel ${escape(item.classification)}"><div class="badges"><span class="badge">${escape(LABELS[item.view]||item.view)}</span><span class="badge ${escape(item.classification)}">${escape(item.classification)}</span></div><h2>${escape(item.title)}</h2><small>${escape(item.module)}</small><pre>${escape(item.content)}</pre>${item.source?`<div class="source">Source: ${escape(item.source)}</div>`:""}</article>`).join(""):`<div class="empty"><h2>No verified evidence yet</h2><p>Bob will update this file as each workshop activity is completed.</p></div>`}
    const views=document.querySelector("#views");Object.entries(LABELS).forEach(([key,label])=>{const button=document.createElement("button");button.textContent=label;button.classList.toggle("active",key===active);button.onclick=()=>{active=key;views.querySelectorAll("button").forEach(x=>x.classList.remove("active"));button.classList.add("active");render()};views.append(button)});document.querySelector("#search").addEventListener("input",render);render();
  </script>
</body>
</html>
